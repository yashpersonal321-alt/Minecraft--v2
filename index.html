<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlockCraft - Minecraft Style Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            pointer-events: none;
        }
        
        button {
            pointer-events: auto;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffaa00;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        button:active {
            transform: scale(0.95);
            background: #ffaa00;
        }
        
        .joystick {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,170,0,0.5);
            pointer-events: auto;
        }
        
        .joystick-handle {
            width: 50px;
            height: 50px;
            background: #ffaa00;
            border-radius: 25px;
            position: relative;
            top: 35px;
            left: 35px;
            transition: transform 0.02s linear;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: white;
            text-shadow: 0 0 5px black;
            z-index: 50;
            pointer-events: none;
        }
        
        #hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 16px;
            z-index: 100;
            pointer-events: auto;
        }
        
        .slot {
            width: 50px;
            height: 50px;
            background: rgba(30,30,40,0.9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .slot.selected {
            border-color: #ffaa00;
            background: rgba(255,170,0,0.3);
            box-shadow: 0 0 10px #ffaa00;
        }
        
        #coords {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            z-index: 50;
            pointer-events: none;
        }
        
        #block-name {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            color: #ffaa00;
            font-size: 12px;
            font-weight: bold;
            z-index: 50;
            pointer-events: none;
        }
        
        #health {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ff5555;
            font-weight: bold;
            z-index: 50;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .slot { width: 45px; height: 45px; font-size: 20px; }
            button { width: 55px; height: 55px; font-size: 20px; }
            .joystick { width: 100px; height: 100px; }
            .joystick-handle { width: 40px; height: 40px; top: 30px; left: 30px; }
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="block-name">🌿 Grass</div>
    <div id="coords">X: 0, Y: 0, Z: 0</div>
    <div id="health">❤️ 20</div>
    
    <div class="joystick" id="joystick">
        <div class="joystick-handle" id="joystick-handle"></div>
    </div>
    
    <div id="controls">
        <button id="break-btn">🔨</button>
        <button id="place-btn">🧱</button>
        <button id="jump-btn">🦘</button>
    </div>
    
    <div id="hotbar">
        <div class="slot selected" data-block="grass">🌿</div>
        <div class="slot" data-block="wood">🪵</div>
        <div class="slot" data-block="stone">🪨</div>
        <div class="slot" data-block="brick">🧱</div>
        <div class="slot" data-block="diamond">💎</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
